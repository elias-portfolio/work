    function get2amTimezoneOffset() {
  const utcHour = new Date().getUTCHours();
  let offset = (2 - utcHour + 24) % 24;
  if (offset > 12) offset -= 24;
  return offset;
}

function updateRadio() {
  const offset = get2amTimezoneOffset();
  const stream = radioStreams[offset];
  const audioPlayer = document.getElementById('radio-player');
  const locationEl = document.getElementById('stream-info');
  const location = streamLocations[offset] || "unknown location";
  
  const bgUrl = backgroundStreams[offset];
  const iframe = document.getElementById("bg-stream-iframe");
  const img = document.getElementById("bg-stream-img");
  const video = document.getElementById("bg-stream-video");
  
  locationEl.textContent = `on air: gmt ${offset >= 0 ? '+' : ''}${offset}, ${location.toLowerCase()}`;
  
  // Set background content
  clearInterval(window._radioModeImageInterval);

  if (window._radioModeHls) {
    try { window._radioModeHls.destroy(); } catch (e) {}
    window._radioModeHls = null;
  }

  if (bgUrl === "shors-refresh") {
    img.style.display = "block";
    iframe.style.display = "none";
    video.style.display = "none";

    const refreshImage = () => {
      const timestamp = new Date().getTime();
      img.src = `https://www.shors.ru/images/camera/image96.jpg?${timestamp}`;
    };

    refreshImage();
    window._radioModeImageInterval = setInterval(refreshImage, 60000);
  } else if (bgUrl && bgUrl.includes('youtube.com')) {
    iframe.style.display = "block";
    img.style.display = "none";
    video.style.display = "none";
    iframe.src = bgUrl;
  } else if (bgUrl && (bgUrl.includes('.jpg') || bgUrl.includes('.jpeg') || bgUrl.includes('.png') || bgUrl.includes('mjpg'))) {
    img.style.display = "block";
    iframe.style.display = "none";
    video.style.display = "none";
    img.src = bgUrl;
  } else if (bgUrl && bgUrl.endsWith('.m3u8')) {
    iframe.style.display = "none";
    img.style.display = "none";
    video.style.display = "block";
    video.muted = true;

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = bgUrl;
      video.load();
      video.play().catch(console.error);
    } else if (window.Hls) {
      window._radioModeHls = new Hls();
      window._radioModeHls.loadSource(bgUrl);
      window._radioModeHls.attachMedia(video);
      window._radioModeHls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(console.error);
      });
    }
  } else if (bgUrl && bgUrl.endsWith('.mp4')) {
    iframe.style.display = "none";
    img.style.display = "none";
    video.style.display = "block";
    video.src = bgUrl;
    video.load();
    video.play().catch(console.error);
  } else {
    iframe.style.display = "block";
    img.style.display = "none";
    video.style.display = "none";
    iframe.src = bgUrl || "";
  }

  if (stream) {
    audioPlayer.src = stream;
    audioPlayer.play().catch(console.error);
  }
}

function scheduleHourlyUpdate() {
  updateRadio(); // Initial run

  const now = new Date();
  const msUntilNextHour =
    (60 - now.getMinutes()) * 60 * 1000 -
    now.getSeconds() * 1000 -
    now.getMilliseconds();

  setTimeout(() => {
    updateRadio(); // Right on the hour
    setInterval(updateRadio, 60 * 60 * 1000); // Every hour
  }, msUntilNextHour);
}

function updateClockLogo() {
  const now = new Date();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const mStr = m.toString().padStart(2, '0');
  const sStr = s.toString().padStart(2, '0');
  document.getElementById('clock-time').textContent = `02:${mStr}:${sStr}`;
}

document.getElementById('clock-logo').onclick = () => {
  const audio = document.getElementById('radio-player');
  if (audio.paused) {
    audio.play().catch(err => console.error("Error playing audio:", err));
  } else {
    audio.pause();
  }
};

// Removed fullscreen functionality as it interferes with play/pause

setInterval(updateClockLogo, 1000);

	  const audio = document.getElementById("radio-player");
const asciiWave = document.getElementById("ascii-wave");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sourceNode = audioCtx.createMediaElementSource(audio);
const analyser = audioCtx.createAnalyser();

analyser.fftSize = 128;
const bufferLength = analyser.fftSize;
const dataArray = new Uint8Array(bufferLength);

sourceNode.connect(analyser);
analyser.connect(audioCtx.destination);

function renderWaveform() {
  analyser.getByteTimeDomainData(dataArray);

  const wave = Array.from(dataArray)
    .filter((_, i) => i % 4 === 0) // 
    .map(value => {
      const v = (value - 128) / 128; 
      const row = Math.floor((v + 1) * 10);
      return ' '.repeat(row) + '*';
    })
    .join('\n');

  asciiWave.textContent = wave;
  requestAnimationFrame(renderWaveform);
}

audio.addEventListener('play', () => {
  audioCtx.resume();
  renderWaveform();
});
</script>
