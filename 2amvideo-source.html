<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2AM Video Source</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
    .video-bg { position:fixed; inset:0; background:#000; }
    #bg-frame, #bg-video { position:absolute; top:50%; left:50%; width:177.77777778vh; height:100vh; transform:translate(-50%,-50%) scale(1.5); transform-origin:center center; border:0; pointer-events:none; object-fit:cover; }
    #bg-video { display:none; }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div class="video-bg">
    <iframe id="bg-frame" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen frameborder="0" playsinline></iframe>
    <video id="bg-video" muted playsinline loop></video>
  </div>
  <script>
    // Video-only source page (no radio/text). This page is meant to be iframed by online 2amtext.
    const backgroundStreams = {
      "-12": "https://clark-pci-spreading-naval.trycloudflare.com/stream/og8bbxl0iW8/index.m3u8",
      "-11": "https://clark-pci-spreading-naval.trycloudflare.com/stream/og8bbxl0iW8/index.m3u8",
      "-10": "https://clark-pci-spreading-naval.trycloudflare.com/stream/zPH5KtjJFaQ/index.m3u8",
      "-9": "https://stream.ktuh.org:8001/stream",
      "-8": "https://clark-pci-spreading-naval.trycloudflare.com/stream/61pi8UjLOlo/index.m3u8",
      "-7": "https://clark-pci-spreading-naval.trycloudflare.com/stream/EO_1LWqsCNE/index.m3u8",
      "-6": "https://radio.mensajito.mx/nopalVentana",
      "-5": "https://clark-pci-spreading-naval.trycloudflare.com/stream/cVpdwCQ7LEc/index.m3u8",
      "-4": "https://clark-pci-spreading-naval.trycloudflare.com/stream/AGCEEBwRUc0/index.m3u8",
      "-3": "https://clark-pci-spreading-naval.trycloudflare.com/stream/z7SiAaN4ogw/index.m3u8",
      "-2": "https://clark-pci-spreading-naval.trycloudflare.com/stream/2tRT7zfx-PI/index.m3u8",
      "-1": "https://clark-pci-spreading-naval.trycloudflare.com/stream/fIMbMz2P7Bs/index.m3u8",
      "0": "https://clark-pci-spreading-naval.trycloudflare.com/stream/yuIm1V7Ne7I/index.m3u8",
      "1": "https://clark-pci-spreading-naval.trycloudflare.com/stream/3nyPER2kzqk/index.m3u8",
      "2": "https://clark-pci-spreading-naval.trycloudflare.com/stream/LAJiFSw2ICc/index.m3u8",
      "3": "https://clark-pci-spreading-naval.trycloudflare.com/stream/e2gC37ILQmk/index.m3u8",
      "4": "https://clark-pci-spreading-naval.trycloudflare.com/stream/JboXN7CuKxc/index.m3u8",
      "5": "https://clark-pci-spreading-naval.trycloudflare.com/stream/Ud4Eptg01gc/index.m3u8",
      "6": "https://clark-pci-spreading-naval.trycloudflare.com/stream/FBYUkqutqzE/index.m3u8",
      "7": "https://clark-pci-spreading-naval.trycloudflare.com/stream/z7SiAaN4ogw/index.m3u8",
      "8": "https://clark-pci-spreading-naval.trycloudflare.com/stream/3szkFHfr6sA/index.m3u8",
      "9": "https://clark-pci-spreading-naval.trycloudflare.com/stream/DjdUEyjx8GM/index.m3u8",
      "10": "https://clark-pci-spreading-naval.trycloudflare.com/stream/5uZa3-RMFos/index.m3u8",
      "11": "https://clark-pci-spreading-naval.trycloudflare.com/stream/BQR800Gu28g/index.m3u8",
      "12": "shors-refresh"
    };


    let currentVideoIndex = 0;
    let ytPlayer = null;
    
    // YouTube Player API functions
    function initYouTubePlayer(videoUrl) {
      const videoId = extractYouTubeId(videoUrl);
      if (!videoId) return null;
      
      if (window.YT && window.YT.Player) {
        // Player already exists, just load new video
        if (ytPlayer) {
          ytPlayer.loadVideoById(videoId);
          return ytPlayer;
        }
        
        // Create new player
        ytPlayer = new YT.Player('bg-frame', {
          videoId: videoId,
          playerVars: {
            'autoplay': 1,
            'mute': 1,
            'controls': 0,
            'loop': 1,
            'playlist': videoId,
            'origin': window.location.origin,
            'enablejsapi': 1,
            'rel': 0,
            'showinfo': 0,
            'modestbranding': 1
          },
          events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
          }
        });
        return ytPlayer;
      }
      return null;
    }
    
    function onPlayerReady(event) {
      // Try to play immediately
      event.target.playVideo();
      
      // Fallback: simulate interaction after delay
      setTimeout(() => {
        try {
          document.getElementById('bg-frame').click();
          event.target.playVideo();
        } catch(e) {}
      }, 1000);
    }
    
    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        event.target.playVideo(); // Restart if ended
      }
    }
    
    function extractYouTubeId(url) {
      const match = url.match(/embed\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : '';
    }

    function getOffset() {
      const params = new URLSearchParams(window.location.search);
      const forced = params.get('offset');
      if (forced !== null) {
        const n = Number(forced);
        if (!Number.isNaN(n) && n >= -12 && n <= 12) return String(n);
      }
      let o = (2 - new Date().getUTCHours() + 24) % 24;
      o = o > 12 ? o - 24 : o;
      return String(o);
    }

    function updateBackground(offset) {
      const newBg = backgroundStreams[offset];
      const bgFrame = document.getElementById('bg-frame');
      const bgVideo = document.getElementById('bg-video');

      clearInterval(window._shorsImageInterval);
      document.getElementById('shors-cam-img')?.remove();

      if (newBg === 'shors-refresh') {
        bgFrame.style.display = 'none';
        bgVideo.style.display = 'none';
        let img = document.createElement('img');
        img.id = 'shors-cam-img';
        img.style.cssText = 'position:absolute;top:50%;left:50%;width:177.77777778vh;height:100vh;transform:translate(-50%,-50%) scale(1.5);object-fit:cover;pointer-events:none;';
        document.querySelector('.video-bg').appendChild(img);
        const refresh = () => img.src = `https://www.shors.ru/images/camera/image96.jpg?${Date.now()}`;
        refresh();
        window._shorsImageInterval = setInterval(refresh, 60000);
        return;
      }

      if (Array.isArray(newBg)) {
        bgFrame.style.display = 'none';
        bgVideo.style.display = 'block';
        bgVideo.src = newBg[currentVideoIndex % newBg.length];
        bgVideo.play().catch(() => {});
        return;
      }

      if (typeof newBg === 'string' && newBg.endsWith('.m3u8')) {
        bgFrame.style.display = 'none';
        bgVideo.style.display = 'block';
        if (window.hls) { window.hls.destroy(); window.hls = null; }
        if (bgVideo.canPlayType('application/vnd.apple.mpegurl')) {
          bgVideo.src = newBg;
          bgVideo.play().catch(() => {});
        } else if (window.Hls) {
          window.hls = new Hls();
          window.hls.loadSource(newBg);
          window.hls.attachMedia(bgVideo);
          window.hls.on(Hls.Events.MANIFEST_PARSED, () => bgVideo.play().catch(() => {}));
        }
        return;
      }

      // default: iframe source (YouTube/webcam)
      bgVideo.style.display = 'none';
      bgFrame.style.display = 'block';
      
      // Use YouTube Player API for YouTube embeds
      if (newBg.includes('youtube.com/embed/')) {
        const videoId = extractYouTubeId(newBg);
        if (videoId) {
          if (window.YT && window.YT.Player) {
            initYouTubePlayer(newBg);
          } else {
            // Fallback to regular iframe if API not loaded yet
            if (bgFrame.src !== newBg) bgFrame.src = newBg;
          }
        }
      } else {
        // Non-YouTube content (webcam, etc.)
        if (bgFrame.src !== newBg) bgFrame.src = newBg;
      }
    }

    let currentOffset = null;
    function tick() {
      const o = getOffset();
      if (o !== currentOffset) {
        currentOffset = o;
        updateBackground(o);
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
