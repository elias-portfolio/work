<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2AM Video Source</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
    .video-bg { position:fixed; inset:0; background:#000; }
    #bg-frame, #bg-video { position:absolute; top:50%; left:50%; width:177.77777778vh; height:100vh; transform:translate(-50%,-50%) scale(1.5); transform-origin:center center; border:0; pointer-events:none; object-fit:cover; }
    #bg-video { display:none; }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div class="video-bg">
    <iframe id="bg-frame" allow="autoplay" allowfullscreen frameborder="0"></iframe>
    <video id="bg-video" muted playsinline loop></video>
  </div>
  <script>
    // Video-only source page (no radio/text). This page is meant to be iframed by online 2amtext.
    const backgroundStreams = {
      "-12": "https://www.youtube.com/embed/og8bbxl0iW8?autoplay=1&mute=1&controls=0&loop=1&playlist=og8bbxl0iW8&vq=hd1080&enablejsapi=1",
      "-11": "https://www.youtube.com/embed/og8bbxl0iW8?autoplay=1&mute=1&controls=0&loop=1&playlist=og8bbxl0iW8&vq=hd1080&enablejsapi=1",
      "-10": "https://www.youtube.com/embed/og8bbxl0iW8?autoplay=1&mute=1&controls=0&loop=1&playlist=og8bbxl0iW8&vq=hd1080",
      "-9": "https://www.youtube.com/embed/tk0tfYDxrUA?autoplay=1&mute=1&controls=0&loop=1&playlist=tk0tfYDxrUA&vq=hd1080",
      "-8": "https://www.youtube.com/embed/61pi8UjLOlo?autoplay=1&mute=1&controls=0&loop=1&playlist=61pi8UjLOlo&vq=hd1080&enablejsapi=1",
      "-7": "https://www.youtube.com/embed/EO_1LWqsCNE?autoplay=1&mute=1&controls=0&loop=1&playlist=EO_1LWqsCNE&vq=hd1080&enablejsapi=1",
      "-6": "https://www.youtube.com/embed/uV3wWHSvkfs?autoplay=1&mute=1&controls=0&loop=1&playlist=uV3wWHSvkfs&vq=hd1080&enablejsapi=1",
      "-5": "https://www.youtube.com/embed/JJpIxHmP6jo?autoplay=1&mute=1&controls=0&loop=1&playlist=JJpIxHmP6jo&vq=hd1080&enablejsapi=1",
      "-4": "https://www.youtube.com/embed/fIMbMz2P7Bs?autoplay=1&mute=1&controls=0&loop=1&playlist=fIMbMz2P7Bs&vq=hd1080",
      "-3": "https://www.youtube.com/embed/z7SiAaN4ogw?autoplay=1&mute=1&controls=0&loop=1&playlist=z7SiAaN4ogw&vq=hd1080&enablejsapi=1",
      "-2": "https://www.youtube.com/embed/2tRT7zfx-PI?autoplay=1&mute=1&controls=0&loop=1&playlist=2tRT7zfx-PI&vq=hd1080&enablejsapi=1",
      "-1": "https://www.youtube.com/embed/9RmM0NdehjY?autoplay=1&mute=1&controls=0&loop=1&playlist=9RmM0NdehjY&vq=hd1080&enablejsapi=1",
      "0": "https://www.youtube.com/embed/yuIm1V7Ne7I?autoplay=1&mute=1&controls=0&vq=hd1080",
      "1": "https://www.youtube.com/embed/3nyPER2kzqk?autoplay=1&mute=1&controls=0&loop=1&playlist=3nyPER2kzqk&vq=hd1080&enablejsapi=1",
      "2": "https://www.youtube.com/embed/KxWuwC7R5kY?autoplay=1&mute=1&controls=0&loop=1&playlist=KxWuwC7R5kY&vq=hd1080&enablejsapi=1",
      "3": "https://www.youtube.com/embed/e2gC37ILQmk?autoplay=1&mute=1&controls=0&loop=1&playlist=e2gC37ILQmk&vq=hd1080",
      "4": "https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1&controls=0&loop=1&playlist=JboXN7CuKxc&vq=hd1080&enablejsapi=1",
      "5": "https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1&controls=0&loop=1&playlist=JboXN7CuKxc&vq=hd1080&enablejsapi=1",
      "6": "https://www.youtube.com/embed/FBYUkqutqzE?autoplay=1&mute=1&controls=0&loop=1&playlist=FBYUkqutqzE&vq=hd1080&enablejsapi=1",
      "7": "https://www.youtube.com/embed/z7SiAaN4ogw?autoplay=1&mute=1&controls=0&loop=1&playlist=z7SiAaN4ogw&vq=hd1080&enablejsapi=1",
      "8": "https://www.youtube.com/embed/3szkFHfr6sA?autoplay=1&mute=1&controls=0&loop=1&playlist=3szkFHfr6sA&vq=hd1080",
      "9": "https://www.youtube.com/embed/DjdUEyjx8GM?autoplay=1&mute=1&controls=0&vq=hd1080",
      "10": "https://www.youtube.com/embed/5uZa3-RMFos?autoplay=1&mute=1&controls=0&vq=hd1080",
      "11": "https://www.youtube.com/embed/BQR800Gu28g?autoplay=1&mute=1&controls=0&loop=1&playlist=BQR800Gu28g&vq=hd1080&enablejsapi=1",
      "12": "shors-refresh"
    };

    let currentVideoIndex = 0;
    let ytPlayer = null;

    function getOffset() {
      const params = new URLSearchParams(window.location.search);
      const forced = params.get('offset');
      if (forced !== null) {
        const n = Number(forced);
        if (!Number.isNaN(n) && n >= -12 && n <= 12) return String(n);
      }
      let o = (2 - new Date().getUTCHours() + 24) % 24;
      o = o > 12 ? o - 24 : o;
      return String(o);
    }

    function updateBackground(offset) {
      const newBg = backgroundStreams[offset];
      const bgFrame = document.getElementById('bg-frame');
      const bgVideo = document.getElementById('bg-video');

      clearInterval(window._shorsImageInterval);
      document.getElementById('shors-cam-img')?.remove();

      if (newBg === 'shors-refresh') {
        bgFrame.style.display = 'none';
        bgVideo.style.display = 'none';
        let img = document.createElement('img');
        img.id = 'shors-cam-img';
        img.style.cssText = 'position:absolute;top:50%;left:50%;width:177.77777778vh;height:100vh;transform:translate(-50%,-50%) scale(1.5);object-fit:cover;pointer-events:none;';
        document.querySelector('.video-bg').appendChild(img);
        const refresh = () => img.src = `https://www.shors.ru/images/camera/image96.jpg?${Date.now()}`;
        refresh();
        window._shorsImageInterval = setInterval(refresh, 60000);
        return;
      }

      if (Array.isArray(newBg)) {
        bgFrame.style.display = 'none';
        bgVideo.style.display = 'block';
        bgVideo.src = newBg[currentVideoIndex % newBg.length];
        bgVideo.play().catch(() => {});
        return;
      }

      if (typeof newBg === 'string' && newBg.endsWith('.m3u8')) {
        bgFrame.style.display = 'none';
        bgVideo.style.display = 'block';
        if (window.hls) { window.hls.destroy(); window.hls = null; }
        if (bgVideo.canPlayType('application/vnd.apple.mpegurl')) {
          bgVideo.src = newBg;
          bgVideo.play().catch(() => {});
        } else if (window.Hls) {
          window.hls = new Hls();
          window.hls.loadSource(newBg);
          window.hls.attachMedia(bgVideo);
          window.hls.on(Hls.Events.MANIFEST_PARSED, () => bgVideo.play().catch(() => {}));
        }
        return;
      }

      // default: iframe source (YouTube/webcam)
      bgVideo.style.display = 'none';
      bgFrame.style.display = 'block';
      if (bgFrame.src !== newBg) bgFrame.src = newBg;
    }

    let currentOffset = null;
    function tick() {
      const o = getOffset();
      if (o !== currentOffset) {
        currentOffset = o;
        updateBackground(o);
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
