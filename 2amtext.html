<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2AM RADIO</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --fg: #f5f1e8;
      --muted: #9a9488;
      --accent: #f2eb0c;
      --accent-2: #ff3800;
      --line: rgba(255,255,255,0.14);
      --panel: rgba(0,0,0,0.62);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
    }

    #background,
    #background iframe,
    #background img,
    #background video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
      background: #000;
    }

    #background::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.24), rgba(0,0,0,0.62));
      pointer-events: none;
    }

    .shell {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      z-index: 1;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      padding: 16px 18px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .meta,
    .status,
    .links,
    .zone-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill,
    .zone-chip,
    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      padding: 6px 10px;
      font-size: 13px;
      color: var(--fg);
      text-decoration: none;
      background: rgba(255,255,255,0.04);
    }

    .zone-chip.active {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #fff;
    }

    .muted { color: var(--muted); }

    .status {
      margin-top: 12px;
      font-size: 14px;
    }

    audio {
      width: min(520px, 100%);
      margin-top: 16px;
      filter: saturate(0.9);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
    }

    .tiny {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      body { overflow: auto; }
      .shell { min-height: 100dvh; }
      .footer {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div id="background"></div>

  <main class="shell">
    <section class="panel">
      <div class="eyebrow">2AM RADIO</div>
      <h1 id="headline">Loading current 2AM zone…</h1>
      <div class="meta">
        <span class="pill" id="offsetPill">GMT</span>
        <span class="pill" id="timePill">Local time</span>
        <span class="pill" id="stationPill">Station</span>
      </div>
      <div class="status" id="status">Resolving stream data…</div>
      <audio id="audio" controls preload="none"></audio>
    </section>

    <section class="footer">
      <div class="panel">
        <div class="eyebrow">Zones</div>
        <div class="zone-strip" id="zoneStrip"></div>
      </div>

      <div class="panel">
        <div class="eyebrow">Direct access</div>
        <div class="links" id="links"></div>
        <p class="tiny">This build streams one zone at a time through the tunnel. Admin still lives next door.</p>
      </div>
    </section>
  </main>

  <script>
    const backgroundEl = document.getElementById('background');
    const audioEl = document.getElementById('audio');
    const headlineEl = document.getElementById('headline');
    const statusEl = document.getElementById('status');
    const offsetPillEl = document.getElementById('offsetPill');
    const timePillEl = document.getElementById('timePill');
    const stationPillEl = document.getElementById('stationPill');
    const zoneStripEl = document.getElementById('zoneStrip');
    const linksEl = document.getElementById('links');

    const TUNNEL_BASE = 'https://identification-sodium-letters-complicated.trycloudflare.com';

    let hlsInstance = null;
    let bgHlsInstance = null;

    function getCurrentOffset() {
      const utcHour = new Date().getUTCHours();
      const raw = (2 - utcHour + 24) % 24;
      return raw > 12 ? raw - 24 : raw;
    }

    function offsetLabel(offset) {
      return `GMT ${offset >= 0 ? '+' : ''}${offset}`;
    }

    function localTimeForOffset(offset) {
      const now = new Date();
      const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
      const zoneTime = new Date(utcMs + offset * 3600000);
      return zoneTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function directVideoUrl(video) {
      if (!video) return null;
      if (video.type === 'youtube' && video.id) return `https://www.youtube.com/watch?v=${video.id}`;
      return video.url || video.embed_url || null;
    }

    function tunnelVideoUrl(video) {
      if (!video || video.type !== 'youtube' || !video.id || !TUNNEL_BASE) return null;
      return `${TUNNEL_BASE}/stream/${video.id}/index.m3u8`;
    }

    function resolvedAudioUrl(stream) {
      if (!stream?.url) return null;

      const isInsecure = stream.url.startsWith('http://');
      const isHls = stream.format === 'hls' || stream.url.includes('.m3u8');

      if (isInsecure && !isHls && TUNNEL_BASE) {
        return `${TUNNEL_BASE}/radio-proxy?url=${encodeURIComponent(stream.url)}`;
      }

      return stream.url;
    }

    function setBackground(video) {
      if (bgHlsInstance) {
        bgHlsInstance.destroy();
        bgHlsInstance = null;
      }

      window.clearInterval(window.__imageRefreshInterval);
      backgroundEl.innerHTML = '';
      if (!video) return;

      const proxiedVideo = tunnelVideoUrl(video);
      if (proxiedVideo) {
        const media = document.createElement('video');
        media.autoplay = true;
        media.muted = true;
        media.loop = true;
        media.playsInline = true;
        media.preload = 'auto';
        media.setAttribute('aria-hidden', 'true');
        backgroundEl.appendChild(media);

        const playMedia = () => media.play().catch(() => {});

        if (window.Hls && Hls.isSupported()) {
          bgHlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
          bgHlsInstance.loadSource(proxiedVideo);
          bgHlsInstance.attachMedia(media);
          bgHlsInstance.on(Hls.Events.MANIFEST_PARSED, playMedia);
          bgHlsInstance.on(Hls.Events.ERROR, (_, data) => {
            if (data?.fatal && video.embed_url) {
              if (bgHlsInstance) {
                bgHlsInstance.destroy();
                bgHlsInstance = null;
              }
              backgroundEl.innerHTML = '';
              const iframe = document.createElement('iframe');
              iframe.src = video.embed_url;
              iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
              iframe.referrerPolicy = 'strict-origin-when-cross-origin';
              backgroundEl.appendChild(iframe);
            }
          });
        } else {
          media.src = proxiedVideo;
          playMedia();
        }

        return;
      }

      if (video.type === 'youtube' && video.embed_url) {
        const iframe = document.createElement('iframe');
        iframe.src = video.embed_url;
        iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        backgroundEl.appendChild(iframe);
        return;
      }

      if (video.type === 'image_refresh' && video.url) {
        const image = document.createElement('img');
        const refresh = () => {
          image.src = `${video.url}${video.url.includes('?') ? '&' : '?'}t=${Date.now()}`;
        };
        refresh();
        backgroundEl.appendChild(image);
        if (video.refresh_interval_ms) {
          window.__imageRefreshInterval = window.setInterval(refresh, video.refresh_interval_ms);
        }
      }
    }

    function loadAudio(stream) {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      audioEl.pause();
      audioEl.removeAttribute('src');
      audioEl.load();

      const audioUrl = resolvedAudioUrl(stream);
      if (!audioUrl) return;

      const isHls = stream.format === 'hls' || stream.url.includes('.m3u8') || audioUrl.includes('.m3u8');
      if (isHls && window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(audioUrl);
        hlsInstance.attachMedia(audioEl);
      } else {
        audioEl.src = audioUrl;
      }

      audioEl.play().then(() => {
        statusEl.textContent = 'Live now. One zone through the tunnel.';
      }).catch(() => {
        statusEl.textContent = 'Ready. Press play if the browser blocks autoplay.';
      });
    }

    function renderZoneStrip(activeOffset, data) {
      const offsets = Object.keys(data.streamLocations).map(Number).sort((a, b) => a - b);
      zoneStripEl.innerHTML = offsets.map(offset => {
        const city = data.streamLocations[String(offset)] || 'Unknown';
        const active = offset === activeOffset ? ' active' : '';
        return `<span class="zone-chip${active}">${offsetLabel(offset)} · ${city}</span>`;
      }).join('');
    }

    function renderLinks(audio, video) {
      const items = [
        { label: 'admin view', href: './admin.html' },
        audio?.url ? { label: 'audio direct', href: audio.url } : null,
        tunnelVideoUrl(video) ? { label: 'video via tunnel', href: tunnelVideoUrl(video) } : null,
        directVideoUrl(video) ? { label: 'video direct', href: directVideoUrl(video) } : null
      ].filter(Boolean);

      linksEl.innerHTML = items
        .map(item => `<a class="link-pill" href="${item.href}" target="_blank" rel="noreferrer">${item.label}</a>`)
        .join('');
    }

    async function boot() {
      const response = await fetch('./stream-data.json');
      const data = await response.json();
      const activeOffset = getCurrentOffset();
      const offsetKey = String(activeOffset);
      const city = data.streamLocations[offsetKey] || 'Unknown location';
      const audio = data.audioStreams[offsetKey];
      const video = data.videoStreams[offsetKey];

      headlineEl.textContent = city;
      offsetPillEl.textContent = offsetLabel(activeOffset);
      timePillEl.textContent = `${localTimeForOffset(activeOffset)} local`;
      stationPillEl.textContent = audio?.station || 'No station mapped';
      statusEl.textContent = 'Preparing live stream…';

      renderZoneStrip(activeOffset, data);
      renderLinks(audio, video);
      setBackground(video);
      loadAudio(audio);
    }

    boot().catch(error => {
      console.error(error);
      headlineEl.textContent = '2AM stream unavailable';
      statusEl.textContent = 'Could not load stream data for the simplified build.';
    });
  </script>
</body>
</html>
